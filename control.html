<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>잡핏 관제 시스템 — 실시간 출근 현황</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: #0F172A; color: #F1F5F9; font-size: 14px; line-height: 1.5; }
  button { font-family: inherit; font-size: 13px; padding: 0 14px; height: 36px; background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 8px; cursor: pointer; color: #F1F5F9; transition: background 0.1s; }
  button:hover:not(:disabled) { background: rgba(255,255,255,0.16); }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  input, select { font-family: inherit; height: 36px; padding: 0 12px; border: 0.5px solid rgba(255,255,255,0.15); border-radius: 8px; background: rgba(255,255,255,0.08); color: #F1F5F9; font-size: 13px; }
  input:focus, select:focus { outline: none; box-shadow: 0 0 0 2px rgba(96,165,250,0.3); }
  select option { background: #1E293B; color: #F1F5F9; }

  /* 레이아웃 */
  body { display: flex; flex-direction: column; }
  .board-topbar { background: #1E293B; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .board-brand { display: flex; align-items: center; gap: 10px; }
  .board-logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; color: #F1F5F9; }
  .board-tag { font-size: 11px; padding: 3px 8px; background: #2563EB; border-radius: 4px; color: #fff; font-weight: 500; }
  .board-clock { font-family: 'SF Mono', Monaco, monospace; font-size: 22px; font-weight: 600; color: #60A5FA; letter-spacing: 1px; }
  .board-clock-date { font-size: 11px; color: #94A3B8; text-align: center; margin-top: 2px; font-family: 'SF Mono', Monaco, monospace; }
  .board-tools { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .board-tools select { min-width: 200px; background: rgba(255,255,255,0.1); }
  .board-tools button { height: 34px; font-size: 12px; }
  .board-sim-group { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.06); padding: 4px 10px; border-radius: 8px; border: 0.5px solid rgba(255,255,255,0.1); }
  .board-sim-group input[type="time"] { height: 28px; font-size: 12px; background: rgba(0,0,0,0.3); color: #F1F5F9; font-family: 'SF Mono', Monaco, monospace; }

  .board-main { padding: 20px 28px 28px; overflow-y: auto; flex: 1; }

  /* 상단 집계 바 — 4개 메트릭 가로 배치 (콤팩트) */
  .board-summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  .board-summary-metric { background: #1E293B; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .board-summary-metric-body { display: flex; flex-direction: column; min-width: 0; }
  .board-summary-metric-label { font-size: 11px; color: #94A3B8; font-weight: 500; white-space: nowrap; }
  .board-summary-metric-sub { font-size: 10px; color: #94A3B8; margin-top: 2px; line-height: 1.4; }
  .board-summary-metric-sub strong { color: #F1F5F9; }
  .board-summary-metric-value { font-size: 22px; font-weight: 700; color: #F1F5F9; line-height: 1; white-space: nowrap; }
  .board-summary-metric-unit { font-size: 11px; color: #94A3B8; font-weight: 400; margin-left: 1px; }
  .board-summary-metric.ok .board-summary-metric-value { color: #22C55E; }
  .board-summary-metric.warn .board-summary-metric-value { color: #F59E0B; }
  .board-summary-metric.bad .board-summary-metric-value { color: #EF4444; }
  .board-summary-metric.info .board-summary-metric-value { color: #60A5FA; }

  /* 공고 카드 그리드 */
  .board-grid-title { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
  .board-grid-title h2 { font-size: 18px; font-weight: 600; color: #F1F5F9; }
  .board-grid-title-sub { font-size: 12px; color: #94A3B8; }

  /* 그룹 섹션 (종료/진행/모집) */
  .board-group { margin-bottom: 22px; }
  .board-group-title { font-size: 14px; font-weight: 500; color: #F1F5F9; margin-bottom: 10px; padding: 8px 14px; background: rgba(255,255,255,0.04); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
  .board-group-count { background: rgba(96,165,250,0.2); color: #60A5FA; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-left: 4px; }

  .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .board-card { background: #1E293B; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 18px; transition: all 0.15s; position: relative; overflow: hidden; cursor: pointer; }
  .board-card:hover { background: #243245; border-color: rgba(96,165,250,0.35); transform: translateY(-1px); }
  /* 진행중 출근율 기반 */
  .board-card.high-rate { border-left: 4px solid #22C55E; }
  .board-card.mid-rate  { border-left: 4px solid #F59E0B; }
  .board-card.low-rate  { border-left: 4px solid #EF4444; }
  /* 모집중 구인율 기반 */
  .board-card.open-full { border-left: 4px solid #60A5FA; }
  .board-card.open-mid  { border-left: 4px solid #3B82F6; }
  .board-card.open-low  { border-left: 4px solid #1D4ED8; }
  /* 종료 공고 — 회색 톤 */
  .board-card.done-card { border-left: 4px solid #64748B; opacity: 0.92; }
  .board-card.no-data   { border-left: 4px solid #64748B; }

  /* 상태 뱃지 */
  .board-status-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; vertical-align: middle; margin-left: 6px; letter-spacing: 0.3px; }
  .board-status-badge.done     { background: rgba(100,116,139,0.25); color: #94A3B8; }
  .board-status-badge.progress { background: rgba(34,197,94,0.2);    color: #4ADE80; }
  .board-status-badge.open     { background: rgba(96,165,250,0.2);   color: #60A5FA; }
  .board-status-badge.urgent   { background: #EF4444; color: #fff; animation: badge-blink 1.2s infinite; }
  .board-status-badge.closed-manual { background: rgba(34,197,94,0.2); color: #4ADE80; }
  .board-status-badge.ext      { background: rgba(20,184,166,0.22); color: #2DD4BF; border: 1px solid rgba(20,184,166,0.4); }
  @keyframes badge-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  /* 구인 긴급 카드 — 빨강 펄스 테두리 */
  .board-card.urgent-recruit { border: 2px solid #EF4444 !important; box-shadow: 0 0 0 0 rgba(239,68,68,0.4); animation: urgent-pulse 1.8s infinite; }
  @keyframes urgent-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
    70%  { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  }

  /* 긴급 경고 배너 + 구인완료 버튼 */
  .board-urgent-banner { background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(239,68,68,0.08)); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .board-urgent-text { font-size: 12px; color: #FCA5A5; line-height: 1.5; flex: 1; }
  .board-urgent-text strong { color: #FEF2F2; font-weight: 600; }
  .board-urgent-btn { background: #EF4444 !important; color: #fff !important; border: none !important; border-radius: 6px; padding: 6px 12px; height: 32px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .board-urgent-btn:hover { background: #DC2626 !important; }
  .board-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .board-card-title { font-size: 16px; font-weight: 600; color: #F1F5F9; line-height: 1.3; }
  .board-card-partner { font-size: 11px; color: #94A3B8; margin-top: 3px; }
  .board-card-time { font-family: 'SF Mono', Monaco, monospace; font-size: 12px; color: #60A5FA; background: rgba(96,165,250,0.12); padding: 4px 8px; border-radius: 5px; white-space: nowrap; }
  .board-card-donut-row { display: flex; gap: 16px; align-items: center; }
  .board-card-donut { position: relative; flex-shrink: 0; }
  .board-card-donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .board-card-donut-pct { font-size: 24px; font-weight: 700; color: #F1F5F9; line-height: 1; }
  .board-card-donut-label { font-size: 9px; color: #94A3B8; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .board-card-nums { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; font-size: 13px; }
  .board-card-num { display: flex; align-items: center; justify-content: space-between; }
  .board-card-num-label { color: #94A3B8; display: flex; align-items: center; gap: 5px; }
  .board-card-num-dot { width: 8px; height: 8px; border-radius: 50%; }
  .board-card-num-val { font-weight: 600; color: #F1F5F9; font-size: 15px; }
  .board-card-foot { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; font-size: 11px; color: #94A3B8; }
  .board-card-foot strong { color: #F1F5F9; font-weight: 500; }

  /* placeholder */
  .board-placeholder { background: #1E293B; border: 1px dashed rgba(255,255,255,0.15); border-radius: 14px; padding: 80px 20px; text-align: center; color: #94A3B8; }
  .board-placeholder-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.4; }
  .board-placeholder-title { font-size: 16px; color: #F1F5F9; font-weight: 500; margin-bottom: 4px; }
  .board-placeholder-desc { font-size: 13px; }

  /* 권한 필터 정보 표시 */
  .board-scope { background: rgba(96,165,250,0.08); border: 1px solid rgba(96,165,250,0.2); padding: 8px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 12px; color: #BFDBFE; display: flex; justify-content: space-between; align-items: center; }
  .board-scope-tag { background: #60A5FA; color: #0F172A; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
</style>
</head>
<body>
  <div class="board-topbar">
    <div class="board-brand">
      <span class="board-logo">🖥 잡핏 관제</span>
      <span class="board-tag">LIVE</span>
    </div>
    <div style="text-align:center;">
      <div class="board-clock" id="board-clock">--:--:--</div>
      <div class="board-clock-date" id="board-clock-date">--</div>
    </div>
    <div class="board-tools">
      <div class="board-sim-group">
        <span style="font-size:11px; color:#94A3B8;">시뮬</span>
        <input type="time" id="board-sim-time" step="60">
        <button id="board-sim-reset" style="height:26px; padding:0 8px; font-size:11px;">실시간</button>
      </div>
      <select id="board-admin-select"></select>
      <button onclick="window.__boardRefresh()">↻</button>
      <button onclick="window.close()">닫기 ×</button>
    </div>
  </div>

  <div class="board-main" id="board-main"></div>

  <script src="js/data.js"></script>
  <script src="js/control.js"></script>
</body>
</html>
